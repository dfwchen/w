<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>欢迎屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111111;
            color: #f5f5f5;
            font-family: "Microsoft YaHei", "黑体", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 15px;
        }

        .card {
            position: relative;
            z-index: 10;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0.12), 
                rgba(168,209,255,0.2), 
                rgba(230,200,120,0.15),
                rgba(168,209,255,0.2),
                rgba(255,255,255,0.12)
            );
            background-size: 400% 100%;
            animation: cardFlow 8s linear infinite;
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes cardFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .line-decor {
            width: 90%;
            height: 2px;
            margin: 10px auto 25px;
            background: linear-gradient(90deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0099FF, #0000FF, #9400D3);
            background-size: 700% 100%;
            animation: lineFlow 6s linear infinite;
            box-shadow: 0 0 8px rgba(255,255,255,0.4);
            border-radius: 2px;
        }
        @keyframes lineFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .cn-welcome {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #b88c42, #e6c87a, #f9e9b8);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: goldFlow 5s infinite;
        }
        .jp-welcome {
            font-size: 22px;
            margin: 4px 0 12px 0;
            background: linear-gradient(90deg, #b88c42, #e6c87a);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: goldFlow 6s infinite;
        }
        @keyframes goldFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .guest {
            font-size: 20px;
            line-height: 1.5;
            font-weight: 500;
            text-align: left;
            margin: 0 auto 25px;
            padding-left: 10px;
            color: #fff;
        }
        .guest span {
            color: #5DACFF;
            font-weight: 600;
        }

        .company {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            font-size: 22px;
            color: rgba(210, 230, 248, 0.9);
            margin-bottom: 6px;
        }
        .company img {
            height: 26px;
            width: auto;
            filter: drop-shadow(0 0 6px rgba(168, 209, 255, 0.5));
        }
        .leader {
            text-align: right;
            font-size: 19px;
            color: #a0b4d2;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="cn-welcome">热烈欢迎 贵宾莅临</div>
    <div class="jp-welcome">ご来訪を心より歓迎いたします</div>
    <div class="line-decor"></div>

    <div class="guest">
        <span>スガツネ工業株式会社</span><br>
        菅佐原社長<br>
        <div style="height:0.3em;"></div>
        <span>世嘉智尼五金配件(上海)有限公司</span><br>
        奥山副総経理<br>
        <div style="height:0.3em;"></div>
        <span>広州分公司</span><br>
        金総経理
    </div>

    <div class="company">
        <img src="ew-logo.png" alt="EW">
        永浪有限公司
    </div>
    <div class="leader">森田携全体员工竭诚欢迎</div>
</div>

</body>
</html>
