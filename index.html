<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>欢迎屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            white-space: nowrap; /* 全局禁止自动换行！核心修复 */
        }
        body {
            background: #87CEEB;
            font-family: "微软雅黑", "黑体", sans-serif;
            width: 540px;
            height: 960px;
            padding-top: 50px;   /* 顶部50px */
            padding-left: 20px;  /* 左边距缩小，防止换行 */
            padding-right: 20px; /* 右边也留一点，不贴边 */
            overflow: hidden;
        }

        /* 顶部居中区域 */
        .top-center {
            width: 100%;
            text-align: center;
        }

        /* 七彩流光动画 */
        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes lineFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* 顶部第一行 禁止换行 */
        .cn-welcome {
            font-size: 46px;
            font-weight: bold;
            letter-spacing: 2px; /* 字间距缩小一点，不换行 */
            margin-bottom: 10px;
            background: linear-gradient(90deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0099FF, #0000FF, #9400D3);
            background-size: 700% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbowFlow 8s infinite, bounce 13.2s infinite ease-in-out;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            white-space: nowrap !important; /* 强制不换行 */
            overflow: visible;
        }

        /* 第二行日文 禁止换行 */
        .jp-welcome {
            font-size: 33px;
            margin-bottom: 8px;
            color: #d4af37;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
            font-weight: 600;
            white-space: nowrap !important; /* 强制不换行 */
        }

        /* 七彩分隔线 */
        .line-decor {
            width: 85%;
            height: 2px;
            margin: 10px auto 25px auto;
            background: linear-gradient(90deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0099FF, #0000FF, #9400D3);
            background-size: 700% 100%;
            animation: lineFlow 6.6s linear infinite;
            border-radius: 1px;
        }

        /* 嘉宾文字 允许换行（保持原样） */
        .guest, .guest * {
            white-space: normal;
        }
        .guest {
            font-size: 29px;
            line-height: 1.6;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.35);
        }
        .guest .com-name {
            color: #003366;
        }
        .guest .person-name {
            color: #ffffff;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* Logo */
        .logo-img {
            width: 190px;
            height: auto;
            margin-bottom: 5px;
        }

        /* 底部文字 */
        .footer-text {
            font-size: 24px;
            font-weight: 400;
            color: #002b5c;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            line-height: 1.2;
            white-space: nowrap !important;
        }
    </style>
</head>
<body>

    <div class="top-center">
        <div class="cn-welcome">热烈欢迎 贵宾莅临</div>
        <div class="jp-welcome">ご来訪を心より歓迎いたします</div>
        <div class="line-decor"></div>
    </div>

    <div class="guest">
        <span class="com-name">スガツネ工業株式会社</span><br>
        <span class="person-name">菅佐原社長</span><br><br>
        <span class="com-name">世嘉智尼五金配件(上海)有限公司</span><br>
        <span class="person-name">奥山副総経理</span><br><br>
        <span class="com-name">広州分公司</span><br>
        <span class="person-name">金総経理</span>
    </div>

    <img src="new-ew-logo.png" alt="LOGO" class="logo-img">

    <div class="footer-text">森田聖治を代表し</div>
    <div class="footer-text">全社員一同心より歓迎いたします</div>

</body>
</html>
