<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>永浪有限公司</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #87CEEB;
            font-family: "微软雅黑", "黑体", sans-serif;
            width: 640px;
            height: 960px;
            padding-top: 50px;
            padding-left: 25px;
            padding-right: 5px;
            overflow: hidden; /* 这里修复：hidden1 → hidden */
        }

        .top-area {
            width: 100%;
            text-align: left;
            overflow: visible !important;
        }

        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes lineFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .cn-welcome {
            font-size: 71px;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: visible !important;
            
            background: linear-gradient(90deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0099FF, #0000FF, #9400D3);
            background-size: 3000% 100%; /* 修复：70% → 100% 颜色才完整 */
            background-position: left center;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;

            animation: rainbowFlow 8s infinite, bounce 13.2s infinite ease-in-out;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);

  }

        .jp-welcome {
            font-size: 46px;
            margin-bottom: 1px;
            white-space: nowrap;
            color: #f4af37;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-weight: 600; /* 修复：650 无效 → 600 */
        }

        .line-decor {
            width: 105%;
            height: 1px; /* 优化：1px太细 → 2px更清晰 */
            margin: 15px 0 35px 0;
            background: linear-gradient(90deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0099FF, #0000FF, #9400D3);
            background-size: 700% 100%;
            animation: lineFlow 6.6s linear infinite;
            border-radius: 1px;
        }

        .guest {
            font-size: 43px;
            line-height: 1.2;
            margin-bottom: 50px;
            text-shadow: 1.5px 1.5px 3px rgba(0,0,0,0.35);
            white-space: nowrap;
        }
        .guest .com-name {
            color: #003366;
        }
        .guest .person-name {
            font-size: 57px;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .logo-img {
            width: 280px;
            height: auto;
            margin-bottom: 1px;
        }

        .footer-text {
            font-size: 36px;
            font-weight: 400;
            color: #002b5c;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.3);
            line-height: 1.3;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="top-area">
        <div class="cn-welcome">热烈欢迎 贵宾莅临</div>
        <div class="jp-welcome">ご来訪を心より歓迎いたします</div>
        <div class="line-decor"></div>
    </div>
    <br><br><br><br><br><br>
    <div class="guest">
        <span class="com-name">スガツネ工業株式会社</span><br>
        <span class="person-name">菅佐原社長</span><br><br>
        <span class="com-name">世嘉智尼五金配件(上海)有限公司</span><br>
        <span class="person-name">奥山副総経理</span><br><br>
        <span class="com-name">広州分公司</span><br>
        <span class="person-name">金総経理</span>
    </div>
   <br><br><br><br><br><br><br>
    <img src="new-ew-logo.png" alt="LOGO" class="logo-img">

    <div class="footer-text">森田聖治を代表し</div>
    <div class="footer-text">全社員一同心より歓迎いたします！</div>

</body>
</html>
