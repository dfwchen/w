<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>欢迎屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 天蓝色底色 */
            background: #87CEEB;
            font-family: "微软雅黑", "黑体", sans-serif;
            width: 1080px;
            height: 1920px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 78px;
            overflow: hidden;
        }

        .card {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 七彩流光动画 */
        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* 顶部文字跳动 */
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        /* 七彩线条流动 */
        @keyframes lineFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* 顶部第一行 七彩+跳动 */
        .cn-welcome {
            font-size: 60px;
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 13px;
            background: linear-gradient(90deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0099FF, #0000FF, #9400D3);
            background-size: 700% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbowFlow 8s infinite, bounce 13.2s infinite ease-in-out;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.3);
        }

        /* 第二行日文 金色+立体阴影 */
        .jp-welcome {
            font-size: 43px;
            margin-bottom: 10px;
            color: #d4af37;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            font-weight: 600;
        }

        /* 七彩分隔线 */
        .line-decor {
            width: 90%;
            height: 3px;
            margin: 13px auto 33px;
            background: linear-gradient(90deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0099FF, #0000FF, #9400D3);
            background-size: 700% 100%;
            animation: lineFlow 6.6s linear infinite;
            border-radius: 1px;
        }

        /* 嘉宾整体文字 带阴影立体 */
        .guest {
            font-size: 38px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 52px;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.35);
        }
        /* 会社名称 深蓝色带阴影 */
        .guest .com-name {
            color: #003366;
        }
        /* 社长/副总/总经理 白色+立体阴影 */
        .guest .person-name {
            color: #ffffff;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Logo 样式 */
        .logo-img {
            width: 247px;
            height: auto;
            margin-bottom: 5px;
        }

        /* 底部两行文字：纯色+阴影 */
        .footer-text {
            font-size: 31px;
            font-weight: 400;
            color: #002b5c;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.3);
            line-height: 1.2;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="cn-welcome">热烈欢迎 贵宾莅临</div>
    <div class="jp-welcome">ご来訪を心より歓迎いたします</div>
    <div class="line-decor"></div>
    <br><br><br><br>
    <div class="guest">
        <span class="com-name">スガツネ工業株式会社</span><br>
        <span class="person-name">菅佐原社長</span><br><br>
        <span class="com-name">世嘉智尼五金配件(上海)有限公司</span><br>
        <span class="person-name">奥山副総経理</span><br><br>
        <span class="com-name">広州分公司</span><br>
        <span class="person-name">金総経理</span>
    </div>
    <br><br><br><br><br>
    <img src="new-ew-logo.png" alt="LOGO" class="logo-img">

    <div class="footer-text">森田聖治を代表し</div>
    <div class="footer-text">全社員一同心より歓迎いたします</div>

</div>

</body>
</html>
