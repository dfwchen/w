<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>永浪有限公司</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 深邃商务蓝黑背景，凸显高级感与色彩对比#eef0f2   #0f1973 */
            background: #bebebe;  
            font-family: "微软雅黑", "Helvetica Neue", "黑体", sans-serif;
            width: 640px;
            height: 960px;
            margin: 0 auto;
            padding: 50px 30px 30px 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: #eef5ff;
            box-shadow: none;
        }

        /* 整体容器保证竖屏节奏 */
        .screen-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
        }

        .top-area {
            width: 100%;
            text-align: center;
        }

        /* 彩虹流动动画保持活力 */
        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes softBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
        @keyframes lineShimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .cn-welcome {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 5px;
            margin-bottom: 8px;
            white-space: nowrap;
            
            /* 明亮彩虹渐变，在深色背景上更突出 */
            background: linear-gradient(90deg, #FF3366, #FF9933, #FFD700, #33CC66, #00BFFF, #7B2FBE, #FF1493);
            background-size: 400% 100%;
            background-position: left center;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;

            animation: rainbowFlow 9s infinite, softBounce 11s infinite ease-in-out;
            text-shadow: none;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            line-height: 1.2;
        }

.jp-welcome {
    font-size: 40px;
    margin-bottom: 5px;
    white-space: nowrap;
    /* 柠檬黄，通透清新 */
    color: #fbe522;
    text-shadow: 
        0 2px 8px rgba(240, 230, 140, 0.5),
        0 2px 3px rgba(0, 0, 0, 0.55),
        0 0 2px rgba(0, 0, 0, 0.65);
    font-weight: 500;
    letter-spacing: 1px;
}

        .line-decor {
            width: 90%;
            height: 2px;
            margin: 20px auto 25px auto;
            background: linear-gradient(90deg, #FF3366, #FFB347, #FFD700, #32CD32, #1E90FF, #BA55D3, #FF3366);
            background-size: 200% 100%;
            animation: lineShimmer 5s linear infinite;
            border-radius: 2px;
            box-shadow: 0 0 12px rgba(255,215,0,0.5);
        }

        /* 嘉宾信息区域 */
        .guest {
            font-size: 38px;
            line-height: 1.0;
            margin: 10px 0 20px 0;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            white-space: nowrap;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 公司名称：柔和亮白带一点冷调 #8cf0e6   #002b5c*/
        .guest .com-name {
            color: #002b5c ;
            font-weight: 400;
            letter-spacing: 1px;
            font-size: 40px;
            display: block;
            margin-top: 1px;
            line-height: 0.1;
            text-shadow: 0 2px 5px rgba(0,20,40,0.8);
        }

        /* 人物姓名：使用干净明亮的白色，并加轻微金色描边效果 */
        .guest .person-name {
            font-size: 54px;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(218, 180, 75, 0.9), 0 4px 10px rgba(0,0,0,0.8);
            letter-spacing: 3px;
            display: block;

            margin-top: 0px;  /* 👈 改这个数值 */
        }

        /* 调整每个嘉宾组之间的间距 (通过br控制，但保留视觉节奏) */
        .guest br {
            display: block;
            content: "";
            margin: 1px 0;  /* 👈 改这个数值，数字越大间距越大 */
        }

        .logo-img {
            width: 280px;
            height: auto;
            margin: 15px 0 10px 0;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.6));
            opacity: 0.95;
            transition: transform 0.3s ease;
        }

        /* 底部两行日文：完全保留原样式，只微调与背景的融合感 */
        .footer-text {
            font-size: 34px;
            font-weight: 400;
            /* 保留原来的深蓝色调 #002b5c，但为了在深色背景上可见，使用原色并增加亮度感 */
            color: #002b5c;
            /* 加强文字阴影使其在深底上清晰可见，但不改变颜色值本身 */
            text-shadow: 0 0 12px rgba(255,255,255,0.7), 0 0 25px rgba(173, 216, 230, 0.8);
            line-height: 1.4;
            white-space: nowrap;
            letter-spacing: 1px;
            font-weight: 500;
            background: transparent;
        }

        /* 底部区域居中 */
        .bottom-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: auto;
            width: 100%;
        }

        /* 为了让竖屏布局更紧凑，微调br的视觉效果（保留原有换行结构） */
        br {
            display: block;
            content: "";
            margin: 2px 0;
        }

        /* 针对广告机竖屏优化：所有文字不可选中 */
        body {
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="screen-wrapper">
        <div class="top-area">
            <div class="cn-welcome">热烈欢迎 贵宾莅临</div>
            <div class="jp-welcome">ご来訪を心より歓迎いたします</div>
            <div class="line-decor"></div>
        </div>

        <!-- 保持原有换行结构，用于垂直间距 -->
        <br><br><br>
        
        <div class="guest">
            <span class="com-name">スガツネ工業株式会社</span><br><br>
            <span class="person-name">菅佐原社長</span><br><br><br>
            <span class="com-name">世嘉智尼五金配件(上海)有限公司</span><br><br>
            <span class="person-name">奥山副総経理</span><br><br><br>
            <span class="com-name">広州分公司</span><br><br>
            <span class="person-name">金総経理</span>
        </div>

        <br><br><br><br><br><br>

        <div class="bottom-section">
            <img src="new-ew-logo.png" alt="永浪有限公司 LOGO" class="logo-img">
            <div class="footer-text">森田聖治を代表し</div>
            <div class="footer-text">全社員一同心より歓迎いたします！</div>
        </div>
    </div>
</body>
</html>
