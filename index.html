<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>永浪有限公司</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* ========== 这里换成你的本地图片作为背景 ========== */
            background-image: url("555.jpg"); /* 改成你附件的文件名 */
            background-size: cover;       /* 自动铺满屏幕 */
            background-position: center;  /* 居中显示 */
            background-repeat: no-repeat; /* 不重复 */
            background-attachment: fixed; /* 固定不动 */
            
            font-family: "微软雅黑", "Helvetica Neue", "黑体", sans-serif;
            width: 640px;
            height: 960px;
            margin: 0 auto;
            padding: 50px 30px 30px 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: #eef5ff;
            box-shadow: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .screen-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
        }

        .top-area {
            width: 100%;
            text-align: center;
        }

        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes softBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
        @keyframes lineShimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        @keyframes goldShimmer {
            0% { opacity: 0.5; }
            50% { opacity: 0.9; }
            100% { opacity: 0.5; }
        }

        .cn-welcome {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 5px;
            margin-top: 60px;
            margin-bottom: 3px;
            white-space: nowrap;
            background: linear-gradient(90deg, #FF3366, #FF9933, #FFD700, #33CC66, #00BFFF, #7B2FBE, #FF1493);
            background-size: 400% 100%;
            background-position: left center;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbowFlow 9s infinite, softBounce 11s infinite ease-in-out;
            text-shadow: none;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            line-height: 1.2;
        }

        .jp-welcome {
            font-size: 40px;
            margin-bottom: 5px;
            white-space: nowrap;
            color: #ffffff;
            text-shadow: 
                0 2px 8px rgba(240, 230, 140, 0.5),
                0 2px 3px rgba(0, 0, 0, 0.55),
                0 0 2px rgba(0, 0, 0, 0.65);
            font-weight: 500;
            letter-spacing: 1px;
        }

        .line-decor {
            width: 90%;
            height: 2px;
            margin: 20px auto 25px auto;
            background: linear-gradient(90deg, #FF3366, #FFB347, #FFD700, #32CD32, #1E90FF, #BA55D3, #FF3366);
            background-size: 200% 100%;
            animation: lineShimmer 5s linear infinite;
            border-radius: 2px;
            box-shadow: 0 0 12px rgba(255,215,0,0.5);
        }

        /* 嘉宾信息区域 */
        .guest {
            font-size: 38px;
            line-height: 1.4;
            margin: 10px 0 20px 0;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            white-space: nowrap;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 公司名称 */
        .guest .com-name {
           color: #002b5c;
            font-weight: 400;
            letter-spacing: 1px;
            font-size: 40px;
            display: block;
            margin-top: 32px;
            margin-bottom: 6px;
            line-height: 1.2;
            text-shadow: 0 2px 5px rgba(0,20,40,0.8);
        }

        /* 人物姓名 */
        .guest .person-name {
            font-size: 54px;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(218, 180, 75, 0.9), 0 4px 10px rgba(0,0,0,0.8);
            letter-spacing: 3px;
            display: block;
            margin-top: 6px;
            margin-bottom: 32px;
            line-height: 1.2;
        }

        .guest br {
            display: none;
        }

        .logo-img {
            width: 280px;
            height: auto;
            margin: 15px 0 10px 0;
            /* 白光滤镜 */
            filter: brightness(1.3) contrast(1.1) drop-shadow(0 0 15px rgba(255, 255, 255, 0.7));
            opacity: 0.95;
            transition: transform 0.3s ease;
        }

        /* 底部两行日文：改为白光 */
        .footer-text {
            font-size: 34px;
            font-weight: 500;
            color: #ffffff;
            text-shadow: 
                0 0 15px rgba(255, 255, 255, 0.8),
                0 0 30px rgba(255, 255, 255, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.5);
            line-height: 1.4;
            white-space: nowrap;
            letter-spacing: 1px;
            background: transparent;
        }

        .bottom-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: auto;
            width: 100%;
        }

    </style>
</head>
<body>
    <div class="screen-wrapper">
        <div class="top-area">
            <div class="cn-welcome">热烈欢迎 贵宾莅临</div>
            <div class="jp-welcome">ご来訪を心より歓迎いたします</div>
            <div class="line-decor"></div>
        </div>

        <br><br>
        
        <div class="guest">
            <span class="com-name">スガツネ工業株式会社</span>
            <span class="person-name">菅佐原社長</span>
            <span class="com-name">世嘉智尼五金配件(上海)有限公司</span>
            <span class="person-name">奥山副総経理</span>
            <span class="com-name">広州分公司</span>
            <span class="person-name">金総経理</span>
        </div>

        <br><br><br>

        <div class="bottom-section">
            <img src="new-ew-logo.png" alt="永浪有限公司 LOGO" class="logo-img">
            <div class="footer-text">森田聖治を代表し</div>
            <div class="footer-text">全社員一同心より歓迎いたします！</div>
        </div>
    </div>
</body>
</html>
