<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>欢迎屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 天蓝色底色（你要的颜色） */
            background: #87CEEB;
            color: #fff;
            font-family: "微软雅黑", "黑体", sans-serif;
            width: 1080px;
            height: 1920px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px;
            overflow: hidden;
        }

        /* 全屏卡片 */
        .card {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 统一七彩动画 */
        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 跳动动画 */
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* 顶部第一行：七彩流光 + 跳动 */
        .cn-welcome {
            font-size: 80px;
            font-weight: bold;
            letter-spacing: 8px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0099FF, #0000FF, #9400D3);
            background-size: 700% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbowFlow 30s infinite, bounce 12s infinite ease-in-out;
        }

        /* 第二行文字 */
        .jp-welcome {
            font-size: 56px;
            margin-bottom: 30px;
            color: #00447a;
        }

        /* 七彩线条 */
        .line-decor {
            width: 90%;
            height: 4px;
            margin: 20px auto 50px;
            background: linear-gradient(90deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0099FF, #0000FF, #9400D3);
            background-size: 700% 100%;
            animation: lineFlow 1s linear infinite;
        }
        @keyframes lineFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* 中间嘉宾文字 */
        .guest {
            font-size: 58px;
            line-height: 1.6;
            color: #003366;
            text-align: center;
            margin-bottom: 80px;
        }
        .guest span {
            color: #0055cc;
            font-weight: bold;
        }

        /* 底部公司+文字：七彩 */
        .company, .leader {
            background: linear-gradient(90deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0099FF, #0000FF, #9400D3);
            background-size: 700% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbowFlow 60s infinite;
        }

        .company {
            font-size: 54px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .leader {
            font-size: 42px;
            line-height: 1.5;
        }

        @font-face {
            font-family: 'ArnoldBoeD';
            src: url('字永浪.ttf') format('truetype');
        }
        .ew {
            font-family: 'ArnoldBoeD', sans-serif;
            font-size: 60px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="cn-welcome">热烈欢迎 贵宾莅临</div>
    <div class="jp-welcome">ご来訪を心より歓迎いたします</div>
    <br><br><br>
    <div class="guest">
        <span>スガツネ工業株式会社</span><br>
        菅佐原社長<br><br>
        <span>世嘉智尼五金配件(上海)有限公司</span><br>
        奥山副総経理<br><br>
        <span>広州分公司</span><br>
        金総経理
    </div>

    <div class="company">
        <span class="ew">EW</span> 永浪有限公司
    </div>
    <div class="leader">
        森田聖治を代表し<br>
        全社員一同心より歓迎いたします
    </div>
</div>

</body>
</html>
