<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>欢迎屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111111;
            color: #f5f5f5;
            font-family: "Microsoft YaHei", "黑体", sans-serif;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 20px;
        }

        .card {
            position: relative;
            z-index: 10;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0.12), 
                rgba(168,209,255,0.2), 
                rgba(230,200,120,0.15),
                rgba(168,209,255,0.2),
                rgba(255,255,255,0.12)
            );
            background-size: 400% 100%;
            animation: cardFlow 8s linear infinite;
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 50px 30px;
            width: 100%;
            max-width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }

        @keyframes cardFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .line-decor {
            width: 90%;
            height: 1px;
            margin: 15px 0 30px 0;
            background: linear-gradient(90deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0099FF, #0000FF, #9400D3);
            background-size: 700% 100%;
            animation: lineFlow 6s linear infinite;
            box-shadow: 0 0 8px rgba(255,255,255,0.4);
            border-radius: 1px;
        }
        @keyframes lineFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .cn-welcome {
            font-size: 30px;
            font-weight: bold;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #b88c42, #e6c87a, #f9e9b8);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: goldFlow 5s infinite;
            text-align: left;
        }
        .jp-welcome {
            font-size: 19px;
            margin: 8px 0 15px 0;
            background: linear-gradient(90deg, #b88c42, #e6c87a);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: goldFlow 6s infinite;
            text-align: left;
        }
        @keyframes goldFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .guest {
            font-size: 22px;
            line-height: 1.4;
            font-weight: 500;
            text-align: left;
            margin: 0 0 40px 0;
            color: #fff;
            white-space: nowrap;
        }
        .guest span {
            color: #5DACFF;
            font-weight: 500;
        }

        .company-logo {
            text-align: left;
            margin-bottom: 8px;
            padding-left: 0;
        }
        .company-logo img {
            height: 50px;
            width: auto;
            filter: drop-shadow(0 0 30px rgba(255,255,255,1)) brightness(1.3);
        }

        .leader {
            text-align: left;
            font-size: 16px;
            color: #a0b4d2;
            padding-left: 0;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="cn-welcome">热烈欢迎贵宾莅临</div>
    <div class="jp-welcome">ご来訪を心より歓迎いたします</div>
   <br><br><br>

    <div class="guest">
        <span>スガツネ工業株式会社</span><br>
        菅佐原社長<br>
        <div style="height:1.3em;"></div>
        <span>世嘉智尼五金配件(上海)有限公司</span><br>
        奥山副総経理<br>
        <div style="height:1.3em;"></div>
        <span>広州分公司</span><br>
        金総経理
    </div>
    <br>
    <div class="company-logo">
        <img src="new-ew-logo.png" alt="Logo">
    </div>
        <div style="height:0.1em;"></div>
    <div class="leader">森田聖治を代表し<br>全社員一同心より歓迎いたします</div>
</div>

</body>
</html>
